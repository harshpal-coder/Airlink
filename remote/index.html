<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AirLink Handshake — Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00F2FF;
            --bg: #0B0E14;
            --surface: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --dim: #B0B0B0;
            --success: #00FF88;
            --error: #FF4D6D;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            overflow: hidden;
            touch-action: none;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(0,242,255,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── HEADER ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            background: rgba(11,14,20,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 1rem;
            font-weight: 800;
        }
        .logo i { color: var(--primary); font-size: 0.9rem; }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.28rem 0.75rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.35s ease;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--dim);
            transition: background 0.4s;
        }
        .status-badge.connecting .status-dot { background: #FFD700; animation: blink 0.8s infinite; }
        .status-badge.connected  .status-dot { background: var(--success); }
        .status-badge.connected  { border-color: rgba(0,255,136,0.3); color: var(--success); }
        .status-badge.error      .status-dot { background: var(--error); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── CONNECTING / ERROR ── */
        .center-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.4rem;
            text-align: center;
        }
        .conn-spinner {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 3px solid rgba(0,242,255,0.12);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 12px var(--primary));
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .conn-title { font-size: 1.25rem; font-weight: 700; }
        .conn-sub   { font-size: 0.82rem; color: var(--dim); }

        .error-icon  { font-size: 3.2rem; color: var(--error); }
        .error-title { font-size: 1.15rem; font-weight: 700; }
        .error-sub   { font-size: 0.82rem; color: var(--dim); max-width: 260px; line-height: 1.55; }
        .btn-retry {
            margin-top: 0.4rem;
            background: linear-gradient(135deg, var(--primary), #7000FF);
            color: #0B0E14;
            border: none;
            border-radius: 50px;
            padding: 0.7rem 1.8rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(0,242,255,0.3);
        }

        /* ── VIEWS ── */
        .full-view {
            position: fixed;
            inset: 56px 0 0 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .full-view.active { display: flex; }

        /* ── GESTURE HINTS BAR ── */
        .hints-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hint-chip {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.68rem;
            color: var(--dim);
            letter-spacing: 0.03em;
        }
        .hint-chip i { color: var(--primary); font-size: 0.7rem; }

        /* ── TRACKPAD ── */
        #trackpad {
            flex: 1;
            width: 100%;
            position: relative;
            touch-action: none;
            cursor: none;
            overflow: hidden;
            display: flex;
        }

        /* Right edge scroll strip */
        .scroll-strip {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 50px;
            background: linear-gradient(to left, rgba(0,242,255,0.05), transparent);
            border-left: 1px dashed rgba(0,242,255,0.1);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .scroll-strip i {
            font-size: 1.2rem;
            color: var(--primary);
            opacity: 0.3;
            transform: rotate(0deg);
        }

        /* Inner content */
        .pad-idle-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            opacity: 0.1;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .pad-idle-hint i { font-size: 3rem; color: var(--primary); }
        .pad-idle-hint span { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--primary); }
        #trackpad.active .pad-idle-hint { opacity: 0; }

        /* Subtle grid lines */
        .pad-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(0,242,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Touch indicator (finger position) */
        .finger-dot {
            position: absolute;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,242,255,0.55) 0%, rgba(0,242,255,0.15) 50%, transparent 75%);
            border: 1.5px solid rgba(0,242,255,0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 16px rgba(0,242,255,0.4);
            transition: transform 0.06s ease;
        }
        .finger-dot.scroll-mode {
            background: radial-gradient(circle, rgba(160,80,255,0.55) 0%, rgba(160,80,255,0.15) 50%, transparent 75%);
            border-color: rgba(160,80,255,0.5);
            box-shadow: 0 0 16px rgba(160,80,255,0.4);
        }
        .finger-dot.pressing { transform: translate(-50%, -50%) scale(0.6); }

        /* Tap ripple */
        .tap-ripple {
            position: absolute;
            width: 52px; height: 52px;
            border-radius: 50%;
            border: 2px solid rgba(0,242,255,0.8);
            transform: translate(-50%, -50%) scale(0);
            animation: tapRipple 0.4s ease-out forwards;
            pointer-events: none;
        }
        @keyframes tapRipple { to { transform: translate(-50%, -50%) scale(2.2); opacity: 0; } }

        /* Scroll ripple (different color) */
        .scroll-ripple {
            position: absolute;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(160,80,255,0.8);
            transform: translate(-50%, -50%) scale(0);
            animation: tapRipple 0.3s ease-out forwards;
            pointer-events: none;
        }

        /* ── STATUS COUNTER ── */
        .bottom-bar {
            width: 100%;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(11,14,20,0.6);
        }
        .action-counter {
            font-size: 0.7rem;
            color: var(--dim);
        }
        .action-counter span { color: var(--primary); font-weight: 700; }
        .mode-indicator {
            font-size: 0.68rem;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.05em;
        }
        .mode-indicator i { color: var(--primary); }
        .mode-indicator.scroll-active i { color: #a050ff; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">
            <i class="fa-solid fa-link"></i>
            AirLink Remote
        </div>
        <div class="status-badge connecting" id="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Connecting…</span>
        </div>
    </div>

    <!-- Connecting view -->
    <div class="full-view active" id="view-connecting">
        <div class="center-card">
            <div class="conn-spinner"></div>
            <p class="conn-title">Establishing Link</p>
            <p class="conn-sub">Connecting to your desktop…</p>
        </div>
    </div>

    <!-- Connected — Trackpad view -->
    <div class="full-view" id="view-connected">
        <!-- Gesture hints -->
        <div class="hints-bar">
            <div class="hint-chip"><i class="fa-solid fa-hand-pointer"></i> 1 finger = cursor</div>
            <div class="hint-chip"><i class="fa-solid fa-arrows-up-down"></i> Edge = Scroll</div>
            <div class="hint-chip"><i class="fa-solid fa-hand"></i> Tap = click</div>
        </div>

        <!-- Main trackpad surface -->
        <div id="trackpad">
            <div class="pad-grid"></div>
            <div class="scroll-strip">
                <i class="fa-solid fa-arrows-up-down"></i>
            </div>
            <div class="pad-idle-hint">
                <i class="fa-solid fa-hand-point-up"></i>
                <span>TRACKPAD</span>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <div class="action-counter">Actions: <span id="action-count">0</span></div>
            <div class="mode-indicator" id="mode-indicator">
                <i class="fa-solid fa-arrow-pointer"></i>
                <span id="mode-text">CURSOR</span>
            </div>
        </div>
    </div>

    <!-- Error view -->
    <div class="full-view" id="view-error">
        <div class="center-card">
            <i class="fa-solid fa-circle-xmark error-icon"></i>
            <p class="error-title">Connection Failed</p>
            <p class="error-sub" id="error-sub-msg">Desktop pe "Sync Phone" dobara press karo aur nayi QR scan karo.</p>
            <button class="btn-retry" onclick="location.reload()">
                <i class="fa-solid fa-rotate-right"></i> Retry
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
    (function() {
        // ── DOM refs ──
        const statusBadge  = document.getElementById('status-badge');
        const statusText   = document.getElementById('status-text');
        const viewConn     = document.getElementById('view-connecting');
        const viewConnected= document.getElementById('view-connected');
        const viewError    = document.getElementById('view-error');
        const trackpad     = document.getElementById('trackpad');
        const actionCount  = document.getElementById('action-count');
        const modeIndicator= document.getElementById('mode-indicator');
        const modeText     = document.getElementById('mode-text');
        const errorMsg     = document.getElementById('error-sub-msg');

        const params    = new URLSearchParams(window.location.search);
        const sessionId = params.get('session');

        let count = 0;

        function showView(view) {
            [viewConn, viewConnected, viewError].forEach(v => v.classList.remove('active'));
            view.classList.add('active');
        }
        function setStatus(type, text) {
            statusBadge.className = 'status-badge ' + type;
            statusText.textContent = text;
        }
        function fail(msg) {
            clearTimeout(connectionTimer);
            setStatus('error', 'Failed');
            if (msg) errorMsg.textContent = msg;
            showView(viewError);
        }
        function incCount() {
            count++;
            actionCount.textContent = count;
        }
        function setModeUI(isScroll) {
            if (isScroll) {
                modeIndicator.classList.add('scroll-active');
                modeIndicator.querySelector('i').className = 'fa-solid fa-arrows-up-down';
                modeText.textContent = 'SCROLL';
            } else {
                modeIndicator.classList.remove('scroll-active');
                modeIndicator.querySelector('i').className = 'fa-solid fa-arrow-pointer';
                modeText.textContent = 'CURSOR';
            }
        }

        if (!sessionId) { fail('No session ID. Scan the QR again.'); return; }
        if (typeof mqtt === 'undefined') { fail('MQTT library failed to load.'); return; }

        setStatus('connecting', 'Connecting…');

        let connectionTimer = setTimeout(() => {
            fail('Timed out. Desktop pe "Sync Phone" dobara press karo aur fresh QR scan karo.');
        }, 20000);

        const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
        const scrollTopic = `airlink/${sessionId}/scroll`;
        const ackTopic    = `airlink/${sessionId}/ack`;

        const client = mqtt.connect(MQTT_BROKER, {
            clientId: `al-phone-${sessionId}-${Math.random().toString(36).substring(2,6)}`,
            clean: true,
            connectTimeout: 12000,
            reconnectPeriod: 0
        });

        client.on('connect', () => {
            setStatus('connecting', 'Handshaking…');
            client.subscribe(ackTopic, { qos: 0 });
            client.publish(scrollTopic, JSON.stringify({ action: 'ping' }), { qos: 0 });
        });

        client.on('message', (topic) => {
            if (topic === ackTopic) {
                clearTimeout(connectionTimer);
                setStatus('connected', 'Connected');
                showView(viewConnected);
                setupTrackpad();
            }
        });

        client.on('error', () => fail('MQTT error. Check connection and retry.'));
        client.on('close', () => {
            if (viewConnected.classList.contains('active')) {
                setStatus('error', 'Disconnected');
                showView(viewError);
            }
        });

        // ── TRACKPAD LOGIC ──
        function setupTrackpad() {
            // Sensitivity multiplier — relative movement
            const CURSOR_SENS  = 2.5;  // cursor speed
            const SCROLL_SENS  = 12;   // scroll speed per px

            // Tap detection thresholds
            const TAP_MAX_MOVE = 10;   // px
            const TAP_MAX_MS   = 350;  // ms

            // Per-touch tracking
            let touches = {}; // id → { startX, startY, startTime, lastX, lastY, dot }

            function send(data) {
                if (client.connected) client.publish(scrollTopic, JSON.stringify(data), { qos: 0 });
                incCount();
            }

            function createFingerDot(x, y, isScroll) {
                const d = document.createElement('div');
                d.className = 'finger-dot' + (isScroll ? ' scroll-mode' : '');
                d.style.left = x + 'px';
                d.style.top  = y + 'px';
                trackpad.appendChild(d);
                return d;
            }

            function createRipple(x, y, isScroll) {
                const r = document.createElement('div');
                r.className = isScroll ? 'scroll-ripple' : 'tap-ripple';
                r.style.left = x + 'px';
                r.style.top  = y + 'px';
                trackpad.appendChild(r);
                r.addEventListener('animationend', () => r.remove());
            }

            trackpad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                trackpad.classList.add('active');
                const rect = trackpad.getBoundingClientRect();
                
                // Detection for Scroll Zone (right 15% of the screen)
                const scrollZoneWidth = rect.width * 0.15;
                
                Array.from(e.changedTouches).forEach(t => {
                    const lx = t.clientX - rect.left;
                    const ly = t.clientY - rect.top;
                    
                    // If touch starts in the scroll zone, mark it as a scroll-intent touch
                    const isEdgeTouch = (lx > rect.width - scrollZoneWidth);
                    const isMultiTouch = e.touches.length >= 2;
                    const isScroll = isEdgeTouch || isMultiTouch;
                    
                    setModeUI(isScroll);

                    const dot = createFingerDot(lx, ly, isScroll);
                    touches[t.identifier] = {
                        startX: lx, startY: ly,
                        lastX: lx,  lastY: ly,
                        startTime: Date.now(),
                        isScroll: isScroll,
                        dot
                    };
                });

                // Announce cursor is active if not in scroll mode
                if (!e.touches[0].isScroll) send({ action: 'cursor_show' });
            }, { passive: false });

            trackpad.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = trackpad.getBoundingClientRect();
                
                // Determine if we are in scroll mode based on any active scroll touches or multitouch
                let activeScroll = e.touches.length >= 2;
                Array.from(e.touches).forEach(t => {
                    if (touches[t.identifier] && touches[t.identifier].isScroll) activeScroll = true;
                });
                
                setModeUI(activeScroll);

                if (activeScroll) {
                    // ── SCROLL MODE (Edge or 2-finger) ──
                    let totalDy = 0;
                    let movedCount = 0;
                    Array.from(e.changedTouches).forEach(t => {
                        const tr = touches[t.identifier];
                        if (!tr) return;
                        const lx = t.clientX - rect.left;
                        const ly = t.clientY - rect.top;
                        totalDy += ly - tr.lastY;
                        tr.lastX = lx; tr.lastY = ly;
                        if (tr.dot) { 
                            tr.dot.className = 'finger-dot scroll-mode'; 
                            tr.dot.style.left = lx+'px'; 
                            tr.dot.style.top = ly+'px'; 
                        }
                        movedCount++;
                    });
                    if (movedCount > 0) {
                        const avgDy = totalDy / movedCount;
                        const delta = -avgDy * SCROLL_SENS;
                        if (Math.abs(delta) > 1) {
                            send({ action: 'scroll', delta });
                        }
                    }
                } else {
                    // ── CURSOR MODE ──
                    Array.from(e.changedTouches).forEach(t => {
                        const tr = touches[t.identifier];
                        if (!tr) return;
                        const lx = t.clientX - rect.left;
                        const ly = t.clientY - rect.top;
                        const dx = lx - tr.lastX;
                        const dy = ly - tr.lastY;
                        tr.lastX = lx; tr.lastY = ly;
                        if (tr.dot) { 
                            tr.dot.className = 'finger-dot'; 
                            tr.dot.style.left = lx+'px'; 
                            tr.dot.style.top = ly+'px'; 
                        }
                        if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) {
                            send({ action: 'move', dx: dx * CURSOR_SENS, dy: dy * CURSOR_SENS });
                        }
                    });
                }
            }, { passive: false });

            trackpad.addEventListener('touchend', (e) => {
                e.preventDefault();
                const remainingCount = e.touches.length;
                if (remainingCount < 2) { setModeUI(false); }
                if (remainingCount === 0) {
                    trackpad.classList.remove('active');
                    send({ action: 'cursor_hide' });
                }

                Array.from(e.changedTouches).forEach(t => {
                    const tr = touches[t.identifier];
                    if (!tr) return;

                    const moveX = Math.abs(tr.lastX - tr.startX);
                    const moveY = Math.abs(tr.lastY - tr.startY);
                    const elapsed = Date.now() - tr.startTime;
                    const isTap = moveX < TAP_MAX_MOVE && moveY < TAP_MAX_MOVE && elapsed < TAP_MAX_MS;
                    const isScrollTap = e.touches.length === 0 && Object.keys(touches).length === 2; // two-finger tap (future: right-click)

                    if (isTap && !isScrollTap) {
                        // Single tap = left click
                        if (tr.dot) {
                            tr.dot.classList.add('pressing');
                            setTimeout(() => tr.dot && tr.dot.classList.remove('pressing'), 180);
                        }
                        createRipple(tr.lastX, tr.lastY, false);
                        send({ action: 'click' });
                        if (navigator.vibrate) navigator.vibrate(30);
                    }

                    if (tr.dot) { tr.dot.remove(); }
                    delete touches[t.identifier];
                });
            }, { passive: false });

            // Cleanup if finger somehow lost
            trackpad.addEventListener('touchcancel', (e) => {
                Array.from(e.changedTouches).forEach(t => {
                    if (touches[t.identifier]) {
                        if (touches[t.identifier].dot) touches[t.identifier].dot.remove();
                        delete touches[t.identifier];
                    }
                });
                trackpad.classList.remove('active');
            }, { passive: false });
        }

    })();
    </script>
</body>
</html>
