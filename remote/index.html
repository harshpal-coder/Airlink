<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AirLink Handshake — Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00F2FF;
            --bg: #0B0E14;
            --surface: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --dim: #B0B0B0;
            --success: #00FF88;
            --error: #FF4D6D;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            overflow: hidden;
            touch-action: none;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(0,242,255,0.07) 0%, transparent 70%);
            pointer-events: none;
        }
        .remote-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            position: relative;
        }
        .remote-logo {
            position: absolute;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            opacity: 0.8;
            white-space: nowrap;
        }
        .remote-logo i { color: var(--primary); font-size: 1rem; }
        .status-badge {
            position: absolute;
            top: 1.4rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--dim);
            transition: background 0.4s;
        }
        .status-badge.connecting .status-dot { background: #FFD700; animation: blink 0.8s infinite; }
        .status-badge.connected  .status-dot { background: var(--success); }
        .status-badge.connected  { border-color: rgba(0,255,136,0.3); color: var(--success); }
        .status-badge.error      .status-dot { background: var(--error); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .center-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            text-align: center;
        }
        .conn-spinner {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(0,242,255,0.15);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 12px var(--primary));
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .conn-title { font-size: 1.3rem; font-weight: 700; }
        .conn-sub   { font-size: 0.85rem; color: var(--dim); }

        #view-connected { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 4px;
            gap: 4px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.25s ease;
            letter-spacing: 0.03em;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, rgba(0,242,255,0.2), rgba(112,0,255,0.2));
            border: 1px solid rgba(0,242,255,0.4);
            color: var(--primary);
        }
        .mode-btn i { font-size: 0.8rem; }

        .touchpad-label {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--dim);
        }
        #touchpad {
            width: min(85vw, 340px);
            height: min(52vh, 360px);
            background: var(--surface);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            cursor: none;
            touch-action: none;
            box-shadow: 0 0 40px rgba(0,242,255,0.08), inset 0 0 80px rgba(0,0,0,0.3);
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        #touchpad.active {
            box-shadow: 0 0 60px rgba(0,242,255,0.22), inset 0 0 80px rgba(0,0,0,0.3);
            border-color: rgba(0,242,255,0.45);
        }
        /* Grid crosshair */
        #touchpad::before, #touchpad::after {
            content: '';
            position: absolute;
            background: rgba(0,242,255,0.05);
            pointer-events: none;
        }
        #touchpad::before { width: 1px; height: 100%; top: 0; left: 50%; }
        #touchpad::after  { width: 100%; height: 1px; top: 50%; left: 0; }

        /* Cursor mode indicator inside pad */
        .pad-mode-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.18;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .pad-mode-indicator i { font-size: 2.5rem; color: var(--primary); }
        .pad-mode-indicator span { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--primary); }
        #touchpad.active .pad-mode-indicator { opacity: 0.05; }

        /* Touch ripple */
        .touch-ripple {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,242,255,0.4) 0%, transparent 70%);
            transform: translate(-50%,-50%) scale(0);
            animation: rippleOut 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleOut { to { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }

        /* Trail dot (scroll mode) */
        .trail-dot {
            position: absolute;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transform: translate(-50%,-50%);
            pointer-events: none;
        }

        /* Cursor dot (cursor mode) */
        .cursor-pointer {
            position: absolute;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: rgba(0,242,255,0.85);
            box-shadow: 0 0 12px rgba(0,242,255,0.9), 0 0 24px rgba(0,242,255,0.4);
            border: 2px solid white;
            transform: translate(-50%,-50%);
            pointer-events: none;
            transition: transform 0.05s;
        }
        .cursor-pointer.clicking {
            transform: translate(-50%,-50%) scale(0.6);
            background: white;
        }

        .touchpad-hint {
            font-size: 0.78rem;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .touchpad-hint i { color: var(--primary); }

        .swipe-counter-badge {
            font-size: 0.72rem;
            color: var(--dim);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            padding: 0.25rem 0.9rem;
            border-radius: 50px;
            letter-spacing: 0.05em;
        }

        #view-error { display: none; flex-direction: column; align-items: center; gap: 1rem; }
        .error-icon  { font-size: 3.5rem; color: var(--error); }
        .error-title { font-size: 1.2rem; font-weight: 700; }
        .error-sub   { font-size: 0.85rem; color: var(--dim); max-width: 260px; line-height: 1.5; }
        .btn-retry {
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--primary), #7000FF);
            color: #0B0E14;
            border: none;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
            transition: all 0.25s ease;
        }
        .btn-retry:hover { transform: translateY(-2px); }

        .remote-footer {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .remote-footer i { color: var(--primary); }
    </style>
</head>
<body>
    <div class="remote-wrapper">
        <div class="remote-logo">
            <i class="fa-solid fa-link"></i>
            AirLink Remote
        </div>
        <div class="status-badge connecting" id="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Connecting…</span>
        </div>

        <!-- Connecting view -->
        <div class="center-card" id="view-connecting">
            <div class="conn-spinner"></div>
            <p class="conn-title">Establishing Link</p>
            <p class="conn-sub">Connecting to your desktop…</p>
        </div>

        <!-- Connected view -->
        <div class="center-card" id="view-connected">
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button class="mode-btn active" id="mode-scroll" onclick="setMode('scroll')">
                    <i class="fa-solid fa-arrows-up-down"></i> Scroll
                </button>
                <button class="mode-btn" id="mode-cursor" onclick="setMode('cursor')">
                    <i class="fa-solid fa-arrow-pointer"></i> Cursor
                </button>
            </div>

            <!-- Touchpad -->
            <span class="touchpad-label" id="pad-label">Swipe to Scroll</span>
            <div id="touchpad">
                <div class="pad-mode-indicator" id="pad-icon">
                    <i class="fa-solid fa-arrows-up-down"></i>
                    <span>SCROLL</span>
                </div>
            </div>
            <p class="touchpad-hint" id="pad-hint">
                <i class="fa-solid fa-hand-point-up"></i>
                Swipe up or down
            </p>
            <span class="swipe-counter-badge" id="swipe-count-label">0 actions sent</span>
        </div>

        <!-- Error view -->
        <div class="center-card" id="view-error">
            <i class="fa-solid fa-circle-xmark error-icon"></i>
            <p class="error-title">Connection Failed</p>
            <p class="error-sub" id="error-sub-msg">Desktop pe "Sync Phone" dobara press karo aur nayi QR scan karo.</p>
            <button class="btn-retry" onclick="location.reload()">
                <i class="fa-solid fa-rotate-right"></i> Retry
            </button>
        </div>

        <div class="remote-footer">
            <i class="fa-solid fa-lock"></i>
            Encrypted session relay
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
    (function() {
        const params    = new URLSearchParams(window.location.search);
        const sessionId = params.get('session');

        const statusBadge   = document.getElementById('status-badge');
        const statusText    = document.getElementById('status-text');
        const viewConn      = document.getElementById('view-connecting');
        const viewConnected = document.getElementById('view-connected');
        const viewError     = document.getElementById('view-error');
        const touchpad      = document.getElementById('touchpad');
        const swipeLabel    = document.getElementById('swipe-count-label');
        const errorMsg      = document.getElementById('error-sub-msg');
        const padLabel      = document.getElementById('pad-label');
        const padHint       = document.getElementById('pad-hint');
        const padIcon       = document.getElementById('pad-icon');

        let swipeCount = 0;
        let currentMode = 'scroll'; // 'scroll' | 'cursor'

        // Expose setMode globally for onclick
        window.setMode = function(mode) {
            currentMode = mode;
            document.getElementById('mode-scroll').classList.toggle('active', mode === 'scroll');
            document.getElementById('mode-cursor').classList.toggle('active', mode === 'cursor');

            if (mode === 'scroll') {
                padLabel.textContent = 'Swipe to Scroll';
                padHint.innerHTML = '<i class="fa-solid fa-arrows-up-down" style="color:var(--primary)"></i> Swipe up or down';
                padIcon.innerHTML = '<i class="fa-solid fa-arrows-up-down"></i><span>SCROLL</span>';
            } else {
                padLabel.textContent = 'Move to Control Cursor';
                padHint.innerHTML = '<i class="fa-solid fa-arrow-pointer" style="color:var(--primary)"></i> Move & tap to click';
                padIcon.innerHTML = '<i class="fa-solid fa-arrow-pointer"></i><span>CURSOR</span>';
                // Hide cursor on desktop when switching away from cursor mode
                if (client && client.connected) {
                    client.publish(scrollTopic, JSON.stringify({ action: 'cursor_enter' }), { qos: 0 });
                }
            }
            if (mode === 'scroll' && client && client.connected) {
                client.publish(scrollTopic, JSON.stringify({ action: 'cursor_leave' }), { qos: 0 });
            }
        };

        function showView(view) {
            [viewConn, viewConnected, viewError].forEach(v => v.style.display = 'none');
            view.style.display = 'flex';
        }
        function setStatus(type, text) {
            statusBadge.className = 'status-badge ' + type;
            statusText.textContent = text;
        }
        function fail(msg) {
            clearTimeout(connectionTimer);
            setStatus('error', 'Failed');
            if (msg) errorMsg.textContent = msg;
            showView(viewError);
        }

        if (!sessionId) { fail('No session ID. Scan the QR again.'); return; }
        if (typeof mqtt === 'undefined') { fail('MQTT library failed to load.'); return; }

        showView(viewConn);
        setStatus('connecting', 'Connecting…');

        let connectionTimer = setTimeout(() => {
            fail('Timed out. Desktop pe "Sync Phone" dobara press karo aur fresh QR scan karo.');
        }, 20000);

        const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
        const scrollTopic = `airlink/${sessionId}/scroll`;
        const ackTopic    = `airlink/${sessionId}/ack`;

        const client = mqtt.connect(MQTT_BROKER, {
            clientId: `al-phone-${sessionId}-${Math.random().toString(36).substring(2,6)}`,
            clean: true,
            connectTimeout: 12000,
            reconnectPeriod: 0
        });

        client.on('connect', () => {
            setStatus('connecting', 'Handshaking…');
            client.subscribe(ackTopic, { qos: 0 });
            client.publish(scrollTopic, JSON.stringify({ action: 'ping' }), { qos: 0 });
        });

        client.on('message', (topic, message) => {
            if (topic === ackTopic) {
                clearTimeout(connectionTimer);
                setStatus('connected', 'Connected');
                showView(viewConnected);
                setupTouchpad();
            }
        });

        client.on('error', () => fail('MQTT broker error. Retry.'));
        client.on('close', () => {
            if (viewConnected.style.display !== 'none') {
                setStatus('error', 'Disconnected');
                showView(viewError);
            }
        });

        function setupTouchpad() {
            let lastY = null;
            let trailDot = null;
            let cursorPointer = null;

            // Touch start position for tap detection (cursor mode)
            let tapStartX = 0, tapStartY = 0, tapStartTime = 0;

            function createRipple(x, y) {
                const r = document.createElement('div');
                r.className = 'touch-ripple';
                r.style.left = x + 'px';
                r.style.top  = y + 'px';
                touchpad.appendChild(r);
                r.addEventListener('animationend', () => r.remove());
            }

            // Scroll mode: trail dot
            function moveTrailDot(x, y) {
                if (!trailDot) {
                    trailDot = document.createElement('div');
                    trailDot.className = 'trail-dot';
                    touchpad.appendChild(trailDot);
                }
                trailDot.style.left = x + 'px';
                trailDot.style.top  = y + 'px';
            }
            function removeTrailDot() {
                if (trailDot) { trailDot.remove(); trailDot = null; }
            }

            // Cursor mode: cursor pointer dot
            function moveCursorPointer(x, y) {
                if (!cursorPointer) {
                    cursorPointer = document.createElement('div');
                    cursorPointer.className = 'cursor-pointer';
                    touchpad.appendChild(cursorPointer);
                }
                cursorPointer.style.left = x + 'px';
                cursorPointer.style.top  = y + 'px';
            }
            function removeCursorPointer() {
                if (cursorPointer) { cursorPointer.remove(); cursorPointer = null; }
            }

            touchpad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect  = touchpad.getBoundingClientRect();
                const lx = touch.clientX - rect.left;
                const ly = touch.clientY - rect.top;

                touchpad.classList.add('active');
                createRipple(lx, ly);

                if (currentMode === 'scroll') {
                    lastY = touch.clientY;
                    moveTrailDot(lx, ly);
                } else {
                    // Cursor mode — record tap start
                    tapStartX = lx; tapStartY = ly;
                    tapStartTime = Date.now();
                    moveCursorPointer(lx, ly);
                    // Send initial position
                    const px = lx / rect.width;
                    const py = ly / rect.height;
                    if (client.connected) client.publish(scrollTopic, JSON.stringify({ action: 'move', px, py }), { qos: 0 });
                }
            }, { passive: false });

            touchpad.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect  = touchpad.getBoundingClientRect();
                const lx = touch.clientX - rect.left;
                const ly = touch.clientY - rect.top;

                if (currentMode === 'scroll') {
                    moveTrailDot(lx, ly);
                    if (lastY !== null) {
                        const raw   = touch.clientY - lastY;
                        lastY = touch.clientY;
                        const delta = -raw * 10;
                        if (Math.abs(delta) > 1 && client.connected) {
                            client.publish(scrollTopic, JSON.stringify({ action: 'scroll', delta }), { qos: 0 });
                            swipeCount++;
                            swipeLabel.textContent = `${swipeCount} action${swipeCount !== 1 ? 's' : ''} sent`;
                        }
                    }
                } else {
                    // Cursor mode — send absolute position as percentage
                    moveCursorPointer(lx, ly);
                    const px = Math.max(0, Math.min(1, lx / rect.width));
                    const py = Math.max(0, Math.min(1, ly / rect.height));
                    if (client.connected) {
                        client.publish(scrollTopic, JSON.stringify({ action: 'move', px, py }), { qos: 0 });
                        swipeCount++;
                        swipeLabel.textContent = `${swipeCount} action${swipeCount !== 1 ? 's' : ''} sent`;
                    }
                }
            }, { passive: false });

            touchpad.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchpad.classList.remove('active');

                if (currentMode === 'scroll') {
                    lastY = null;
                    removeTrailDot();
                } else {
                    const rect = touchpad.getBoundingClientRect();
                    const lx = tapStartX;
                    const ly = tapStartY;
                    const elapsed = Date.now() - tapStartTime;
                    const touch = e.changedTouches[0];
                    const moveX = Math.abs((touch.clientX - rect.left) - tapStartX);
                    const moveY = Math.abs((touch.clientY - rect.top) - tapStartY);

                    // Tap = moved < 12px AND held < 400ms
                    if (elapsed < 400 && moveX < 12 && moveY < 12) {
                        const px = lx / rect.width;
                        const py = ly / rect.height;
                        if (client.connected) {
                            client.publish(scrollTopic, JSON.stringify({ action: 'click', px, py }), { qos: 0 });
                            // Visual click on cursor pointer
                            if (cursorPointer) {
                                cursorPointer.classList.add('clicking');
                                setTimeout(() => cursorPointer && cursorPointer.classList.remove('clicking'), 250);
                            }
                            swipeCount++;
                            swipeLabel.textContent = `${swipeCount} action${swipeCount !== 1 ? 's' : ''} sent`;
                        }
                    }
                    removeCursorPointer();
                }
            }, { passive: false });
        }
    })();
    </script>
</body>
</html>
